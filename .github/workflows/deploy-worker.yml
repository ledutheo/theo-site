name: Deploy API Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "wrangler.toml"
      - "package.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: worker-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install wrangler
        run: npm ci

      - name: Deploy worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN ou CLOUDFLARE_ACCOUNT_ID manquant — skip deploy"
            exit 0
          fi
          OUT=$(npx wrangler deploy 2>&1 | tee /tmp/wrangler.out)
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' /tmp/wrangler.out | head -1)
          if [ -z "$URL" ]; then
            URL="https://theo-site-api.workers.dev"
          fi
          echo "api_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Set XAI API key secret on worker
        if: steps.deploy.outputs.api_url != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          if [ -z "${XAI_API_KEY:-}" ]; then
            echo "::warning::XAI_API_KEY manquant — le worker répondra 500"
            exit 0
          fi
          printf '%s' "$XAI_API_KEY" | npx wrangler secret put XAI_API_KEY

      - name: Update config.json
        if: steps.deploy.outputs.api_url != ''
        run: |
          API_URL="${{ steps.deploy.outputs.api_url }}"
          cat > config.json <<EOF
          {
            "apiUrl": "$API_URL",
            "model": "grok-3-mini",
            "stream": true
          }
          EOF

      - name: Commit config.json
        if: steps.deploy.outputs.api_url != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json
          if git diff --cached --quiet; then
            echo "config.json inchangé"
            exit 0
          fi
          git commit -m "chore: maj config.json avec URL worker"
          git push