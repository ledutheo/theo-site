name: Deploy API (Vercel)

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "vercel.json"
      - "package.json"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vercel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check secrets
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID manquant — skip deploy"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: steps.check.outputs.ready == 'true'
        run: npm install -g vercel@latest

      - name: Push XAI_API_KEY to Vercel
        if: steps.check.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          if [ -z "${XAI_API_KEY:-}" ]; then
            echo "::warning::XAI_API_KEY manquant"
            exit 0
          fi
          vercel env rm XAI_API_KEY production --token "$VERCEL_TOKEN" --yes 2>/dev/null || true
          printf '%s' "$XAI_API_KEY" | vercel env add XAI_API_KEY production \
            --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_ORG_ID" \
            --force

      - name: Deploy to Vercel
        if: steps.check.outputs.ready == 'true'
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          URL=$(vercel deploy --prod --token "$VERCEL_TOKEN" --yes 2>&1 | tee /tmp/vercel.out | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | tail -1)
          if [ -z "$URL" ]; then
            URL="https://theo-site-api.vercel.app"
          fi
          echo "base_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $URL"

      - name: Update config.json
        if: steps.check.outputs.ready == 'true'
        run: |
          BASE="${{ steps.deploy.outputs.base_url }}"
          cat > config.json <<EOF
          {
            "apiUrl": "$BASE/api/ask",
            "healthUrl": "$BASE/api/health",
            "model": "grok-3-mini",
            "stream": true
          }
          EOF

      - name: Commit config.json
        if: steps.check.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json
          if git diff --cached --quiet; then
            echo "config.json inchangé"
            exit 0
          fi
          git commit -m "chore: maj config.json avec URL Vercel"
          git push